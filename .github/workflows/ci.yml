name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"

jobs:
  backend-unit:
    name: Backend unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"
      - name: Restore
        run: dotnet restore backend/SICST.slnx
      - name: Test
        run: dotnet test backend/SICST.slnx --configuration Release --no-restore

  backend-integration:
    name: Backend integration tests
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule' || github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"
      - name: Restore
        run: dotnet restore backend/SICST.slnx
      - name: Test with Testcontainers
        env:
          SICST_RUN_TESTCONTAINERS: "true"
        run: dotnet test backend/SICST.slnx --configuration Release --no-restore

  frontend:
    name: Frontend build and Storybook tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        working-directory: frontend
        run: npm ci
      - name: Build
        working-directory: frontend
        run: npm run build
      - name: Storybook tests
        working-directory: frontend
        run: npm run test
      - name: Build Storybook
        working-directory: frontend
        run: npm run build-storybook

  e2e:
    name: E2E opt-in
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        working-directory: frontend
        run: npm ci
      - name: Install browsers
        working-directory: frontend
        run: npx playwright install --with-deps
      - name: E2E
        working-directory: frontend
        run: npm run e2e
